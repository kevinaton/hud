packages:
  - "apps/*"
  - "packages/*"

# pnpm v11+: settings previously under "pnpm" in package.json now live here.
# See https://pnpm.io/settings

allowBuilds:
  '@biomejs/biome': true
  '@node-rs/argon2': true
  '@sentry/cli': true
  better-sqlite3: true
  esbuild: true
  sharp: true

overrides:
  drizzle-orm: "0.38.4"

peerDependencyRules:
  allowedVersions:
    drizzle-orm>@opentelemetry/api: "*"
