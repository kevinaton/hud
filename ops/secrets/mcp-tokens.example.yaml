# mcp-tokens.example.yaml — EXAMPLE FILE (placeholder values only)
#
# THIS FILE IS SAFE TO COMMIT. It contains NO real tokens or hashes.
# All values below are clearly labelled placeholders.
#
# The real file lives on the server at /srv/hud/secrets/mcp-tokens.yaml
# with mode 600, owner hud. It is NEVER committed to git.
#
# To generate a real token:
#   node -e "const c=require('node:crypto'); console.log(c.randomBytes(32).toString('hex'));"
#
# To hash a token for this file (using @node-rs/argon2):
#   node -e "
#     const { hash } = require('/srv/hud/app/node_modules/.pnpm/@node-rs+argon2@2.0.2/node_modules/@node-rs/argon2/index.js');
#     hash('<your-32-byte-hex-token>').then(console.log);
#   "
#
# IMPORTANT: Use camelCase field name 'tokenHash' (NOT 'token_hash').
#            The auth module reads entry.tokenHash; snake_case will fail validation.
#
# Schema: ops/schemas/mcp-tokens.schema.yaml
# Validate: pnpm validate:mcp-config

tokens:
  - identity: platform:hermes-gateway
    tokenHash: "$argon2id$v=19$m=65536,t=3,p=4$AAAAAAAAAAAAAAAAAAAAAA$AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    issued: "2026-06-09"
    expires: "2026-09-07"
    notes: "Server-side Hermes Docker container — Telegram gateway + Hermes Desktop remote backend"

  - identity: platform:hermes-macbook-a
    tokenHash: "$argon2id$v=19$m=65536,t=3,p=4$BBBBBBBBBBBBBBBBBBBBBB$BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
    issued: "2026-06-09"
    expires: "2026-09-07"
    notes: "MacBook #1 local Hermes via Tailscale tailnet"

