# mcp-acl.example.yaml — EXAMPLE FILE (placeholder values only)
#
# THIS FILE IS SAFE TO COMMIT. It contains no real secrets.
# The real file lives on the server at /srv/hud/secrets/mcp-acl.yaml
# with mode 600, owner agent-hud. It is NEVER committed to git.
#
# Authorization semantics (authoritative source: packages/mcp-hud):
#   - Unknown identity → deny all (fail-closed)
#   - Empty allow list → deny all
#   - "*" in allow list → allow all tools not explicitly denied
#   - deny wins over allow on conflict
#   - Tool names may use globs: "vault.*", "cashflow.*", "*"
#
# Schema: ops/schemas/mcp-acl.schema.yaml
# Validate: pnpm validate:mcp-config

identities:
  # Internal HUD persona — full tool surface.
  # Emily and any future HUD persona running as agent-hud use this identity
  # via per-session stdio MCP (not the HTTP/SSE daemon at MVP).
  # This entry is here for documentation and future daemon-mode migration.
  agent:emily/gemini:
    allow:
      - "*"

  # External platform: Hermes server-side Docker container.
  # Used by the Telegram gateway and as the remote backend for Hermes Desktop.
  # Write surface: add + read only. No edit, delete, or destructive operations.
  platform:hermes-gateway:
    allow:
      - cashflow.add
      - cashflow.list
      - cashflow.summary
      - cashflow.categories
    deny:
      - cashflow.edit
      - cashflow.delete
      - cashflow.createCategory
      - "vault.*"
      - "calendar.*"

  # External platform: Hermes running locally on MacBook #1 via Tailscale.
  # Same write surface as hermes-gateway — distinct identity for audit trail.
  platform:hermes-macbook-a:
    allow:
      - cashflow.add
      - cashflow.list
      - cashflow.summary
      - cashflow.categories
    deny:
      - cashflow.edit
      - cashflow.delete
      - cashflow.createCategory
      - "vault.*"
      - "calendar.*"

  # Template for future identities — copy and adjust when onboarding MacBook #2
  # or any other platform.
