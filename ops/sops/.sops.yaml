# sops + age config — committed in MVP, deployed in Phase 1
#
# Prerequisites:
#   brew install age sops
#   age-keygen -o ~/.config/sops/age/keys.txt
#
# Encrypt .env:
#   sops --encrypt --age $(grep "# public key:" ~/.config/sops/age/keys.txt | awk '{print $NF}') .env > .env.enc
#
# Decrypt:
#   sops --decrypt .env.enc > .env
#
# Key rotation:
#   1. Add new age public key to creation_rules below
#   2. Run: sops updatekeys .env.enc
#   3. Remove the old key
#   4. Commit the re-encrypted file

creation_rules:
  - path_regex: \.env(\.enc)?$
    age: >-
      <AGE_PUBLIC_KEY>

  - path_regex: .*secrets.*\.ya?ml$
    age: >-
      <AGE_PUBLIC_KEY>

# Default age key location used by sops (SOPS_AGE_KEY_FILE env var)
# export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt
